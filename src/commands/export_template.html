<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Conversation</title>
<style>
body{margin:0;background:#1e1e2e;color:#cdd6f4;font-family:-apple-system,Segoe UI,Roboto,sans-serif;line-height:1.5}
.wrap{max-width:760px;margin:0 auto;padding:32px 16px}
h1{font-size:18px;color:#89b4fa;margin:0 0 24px}
.msg{margin:0 0 16px;padding:12px 16px;border-radius:10px;white-space:pre-wrap;word-wrap:break-word}
.user{background:#313244}
.assistant{background:#181825;border:1px solid #313244}
.role{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.5px;opacity:.6;margin-bottom:6px}
.user .role{color:#a6e3a1}
.assistant .role{color:#89b4fa}
</style>
</head>
<body>
<div class="wrap">
<h1>Conversation</h1>
<!--MESSAGES-->
</div>
</body>
</html>
